<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDEN - AI Assistant Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-indicator.online {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        
        .status-indicator.offline {
            background: #ef4444;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            font-weight: 600;
            color: #333;
        }
        
        .sessions-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .session-item {
            padding: 12px;
            background: #f9fafb;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .session-date {
            font-size: 0.9em;
            color: #666;
        }
        
        .session-stats {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            font-size: 0.9em;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .error {
            color: #ef4444;
            padding: 10px;
            background: #fee;
            border-radius: 6px;
            margin-top: 10px;
        }
        
        .big-stat {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin: 20px 0;
        }
        
        .config-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
        }
        
        .config-label {
            font-weight: 600;
            color: #333;
            min-width: 120px;
        }
        
        .config-value {
            color: #666;
            font-family: monospace;
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ARDEN</h1>
            <p class="subtitle">AI Routine Daily Engagement Nexus</p>
        </header>
        
        <div class="dashboard">
            <div class="card">
                <h2><span class="status-indicator" id="bot-status"></span>Bot Status</h2>
                <div id="bot-info" class="loading">Loading...</div>
            </div>
            
            <div class="card">
                <h2>Statistics</h2>
                <div id="stats-info" class="loading">Loading...</div>
            </div>
            
            <div class="card">
                <h2>Configuration</h2>
                <div id="config-info" class="loading">Loading...</div>
            </div>
        </div>
        
        <div class="card">
            <h2>Recent Sessions</h2>
            <div id="sessions-list" class="loading">Loading...</div>
        </div>
        
        <footer>
            <p>ARDEN Dashboard | Server: rocket.id10t.social</p>
        </footer>
    </div>
    
    <script>
        // Fetch and update bot status
        async function updateBotStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const statusEl = document.getElementById('bot-status');
                const infoEl = document.getElementById('bot-info');
                
                statusEl.className = 'status-indicator online';
                
                infoEl.innerHTML = `
                    <div class="stat-item">
                        <span class="stat-label">AI Provider</span>
                        <span class="stat-value">${data.bot.provider}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Model</span>
                        <span class="stat-value">${data.bot.model}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">STT</span>
                        <span class="stat-value">${data.voice.stt}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">TTS</span>
                        <span class="stat-value">${data.voice.tts}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Uptime</span>
                        <span class="stat-value">${formatUptime(data.server.uptime)}</span>
                    </div>
                `;
            } catch (error) {
                document.getElementById('bot-status').className = 'status-indicator offline';
                document.getElementById('bot-info').innerHTML = `<div class="error">Error loading status</div>`;
            }
        }
        
        // Fetch and update stats
        async function updateStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('stats-info').innerHTML = `
                    <div class="big-stat">${data.totalMessages}</div>
                    <div class="stat-item">
                        <span class="stat-label">Total Messages</span>
                        <span class="stat-value">${data.totalMessages}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total Sessions</span>
                        <span class="stat-value">${data.totalSessions}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Avg per Session</span>
                        <span class="stat-value">${data.averageMessagesPerSession}</span>
                    </div>
                `;
            } catch (error) {
                document.getElementById('stats-info').innerHTML = `<div class="error">Error loading stats</div>`;
            }
        }
        
        // Fetch and update configuration
        async function updateConfig() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                
                document.getElementById('config-info').innerHTML = `
                    <div class="config-item">
                        <span class="config-label">AI Provider:</span>
                        <span class="config-value">${data.ai.provider}</span>
                    </div>
                    <div class="config-item">
                        <span class="config-label">AI Model:</span>
                        <span class="config-value">${data.ai.model}</span>
                    </div>
                    <div class="config-item">
                        <span class="config-label">STT Provider:</span>
                        <span class="config-value">${data.voice.stt_provider}</span>
                    </div>
                    <div class="config-item">
                        <span class="config-label">TTS Provider:</span>
                        <span class="config-value">${data.voice.tts_provider}</span>
                    </div>
                `;
            } catch (error) {
                document.getElementById('config-info').innerHTML = `<div class="error">Error loading config</div>`;
            }
        }
        
        // Fetch and update recent sessions
        async function updateSessions() {
            try {
                const response = await fetch('/api/sessions/recent?limit=10');
                const data = await response.json();
                
                if (data.sessions && data.sessions.length > 0) {
                    document.getElementById('sessions-list').innerHTML = `
                        <div class="sessions-list">
                            ${data.sessions.map(session => `
                                <div class="session-item">
                                    <div><strong>${session.filename}</strong></div>
                                    <div class="session-date">${new Date(session.date).toLocaleString()}</div>
                                    <div class="session-stats">
                                        <span>Messages: ${session.messageCount}</span>
                                        <span>Size: ${formatBytes(session.size)}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    document.getElementById('sessions-list').innerHTML = '<p>No sessions yet</p>';
                }
            } catch (error) {
                document.getElementById('sessions-list').innerHTML = `<div class="error">Error loading sessions</div>`;
            }
        }
        
        // Helper functions
        function formatUptime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            return `${hours}h ${minutes}m`;
        }
        
        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        // Initial load
        updateBotStatus();
        updateStats();
        updateConfig();
        updateSessions();
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            updateBotStatus();
            updateStats();
            updateSessions();
        }, 30000);
    </script>
</body>
</html>
