<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDEN - TODOs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7aa2f7',
                        secondary: '#bb9af7',
                        accent: '#9ece6a',
                        danger: '#f7768e',
                        warning: '#e0af68',
                        background: '#1a1b26',
                        surface: '#24283b',
                        border: '#414868',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1a1b26;
        }
        .todo-item {
            transition: all 0.2s;
        }
        .todo-item:hover {
            background-color: #2a2f47;
        }
        .todo-checked {
            opacity: 0.6;
        }
        .todo-checked .todo-text {
            text-decoration: line-through;
        }
    </style>
</head>
<body class="min-h-screen bg-background">
    <!-- Header -->
    <header class="bg-surface border-b border-border">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="/assets/images/arden-logo.png" alt="ARDEN Logo" style="height: 40px; width: 40px; object-fit: contain;" onerror="this.style.display='none'">
                <h1 class="text-2xl font-bold" style="color: #c0caf5;">ARDEN</h1>
                <nav class="hidden md:flex space-x-4">
                    <a href="/chat.html" class="hover:text-primary" style="color: #9aa5ce; text-decoration: none;">Chat</a>
                    <a href="/notes.html" class="hover:text-primary" style="color: #9aa5ce; text-decoration: none;">Notes</a>
                    <a href="/todos.html" class="text-primary font-medium" style="text-decoration: none;">TODOs</a>
                    <a href="/skills.html" class="hover:text-primary" style="color: #9aa5ce;">Skills</a>
                    <a href="/dashboard.html" class="hover:text-primary" style="color: #9aa5ce; text-decoration: none;">Dashboard</a>
                    <a href="/settings.html" class="hover:text-primary" style="color: #9aa5ce; text-decoration: none;">Settings</a>
                </nav>
            </div>
            <div class="flex items-center space-x-4">
                <button id="logout-button" class="hover:text-danger text-sm" style="color: #9aa5ce;">
                    Logout
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-6">
        <!-- Header Actions -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-bold" style="color: #c0caf5;">TODO Management</h2>
                <p class="text-sm mt-1" style="color: #9aa5ce;" id="last-updated">Loading...</p>
            </div>
            <div class="flex items-center space-x-3">
                <button id="consolidate-btn" class="bg-secondary hover:bg-opacity-80 font-medium px-4 py-2 rounded-lg transition-colors" style="color: #1a1b26;">
                    🔄 Consolidate
                </button>
                <button id="new-todo-btn" class="bg-primary hover:bg-opacity-80 font-medium px-4 py-2 rounded-lg transition-colors" style="color: #1a1b26;">
                    + New TODO
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6" id="stats-container">
            <div class="bg-surface border border-border rounded-lg p-4">
                <div class="text-sm" style="color: #9aa5ce;">Total TODOs</div>
                <div class="text-2xl font-bold mt-1" style="color: #c0caf5;" id="stat-total">-</div>
            </div>
            <div class="bg-surface border border-border rounded-lg p-4">
                <div class="text-sm" style="color: #9aa5ce;">Pending</div>
                <div class="text-2xl font-bold mt-1" style="color: #e0af68;" id="stat-pending">-</div>
            </div>
            <div class="bg-surface border border-border rounded-lg p-4">
                <div class="text-sm" style="color: #9aa5ce;">Completed</div>
                <div class="text-2xl font-bold mt-1" style="color: #9ece6a;" id="stat-completed">-</div>
            </div>
            <div class="bg-surface border border-border rounded-lg p-4">
                <div class="text-sm" style="color: #9aa5ce;">Files with TODOs</div>
                <div class="text-2xl font-bold mt-1" style="color: #7aa2f7;" id="stat-files">-</div>
            </div>
        </div>

        <!-- Filter Controls -->
        <div class="bg-surface border border-border rounded-lg p-4 mb-6">
            <div class="flex flex-wrap items-center gap-4">
                <div class="flex-1 min-w-64 relative">
                    <input type="text" id="search-input" placeholder="🔍 Search TODOs..." 
                           class="w-full px-4 py-2 pr-10 rounded-lg focus:outline-none focus:ring-1 focus:ring-primary"
                           style="background-color: #1a1b26; border: 1px solid #414868; color: #c0caf5;">
                    <button id="clear-search" 
                            class="absolute right-2 top-1/2 transform -translate-y-1/2 w-6 h-6 rounded-full flex items-center justify-center hover:bg-opacity-80 transition-all opacity-0 pointer-events-none"
                            style="background-color: #414868; color: #9aa5ce; font-size: 0.75rem;"
                            title="Clear search">
                        ✕
                    </button>
                </div>
                <div class="flex items-center space-x-2">
                    <label style="color: #9aa5ce; font-size: 0.9rem;">Filter:</label>
                    <select id="filter-status" class="px-3 py-2 rounded-lg focus:outline-none focus:ring-1 focus:ring-primary"
                            style="background-color: #1a1b26; border: 1px solid #414868; color: #c0caf5;">
                        <option value="active">Active Only</option>
                        <option value="all">All</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="flex items-center space-x-2">
                    <label style="color: #9aa5ce; font-size: 0.9rem;">Sort:</label>
                    <select id="sort-order" class="px-3 py-2 rounded-lg focus:outline-none focus:ring-1 focus:ring-primary"
                            style="background-color: #1a1b26; border: 1px solid #414868; color: #c0caf5;">
                        <option value="file-asc">File (A-Z)</option>
                        <option value="file-desc">File (Z-A)</option>
                        <option value="date-desc">Date (Newest First)</option>
                        <option value="date-asc">Date (Oldest First)</option>
                        <option value="text-asc">Text (A-Z)</option>
                        <option value="text-desc">Text (Z-A)</option>
                    </select>
                </div>
                <button id="toggle-archive" class="px-3 py-2 rounded-lg hover:bg-opacity-80 transition-colors flex items-center space-x-2"
                        style="background-color: #414868; color: #c0caf5;"
                        title="Show/hide completed TODOs">
                    <span id="archive-icon">📦</span>
                    <span id="archive-text">Show Archived</span>
                </button>
                <button id="clear-filters" class="px-3 py-2 rounded-lg hover:bg-opacity-80 transition-colors"
                        style="background-color: #414868; color: #c0caf5;">
                    Clear
                </button>
            </div>
        </div>

        <!-- TODO List -->
        <div id="todos-container" class="space-y-2">
            <!-- TODOs will be rendered here -->
            <div class="text-center py-12" style="color: #9aa5ce;">
                <div class="text-4xl mb-4">📝</div>
                <p>Loading TODOs...</p>
            </div>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/websocket.js?v=1"></script>
    <script src="/assets/js/todos.js"></script>
</body>
</html>
