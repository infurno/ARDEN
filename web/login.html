<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDEN - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        background: '#1e1e1e',
                        surface: '#2d2d2d',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1e1e1e;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-background">
    <div class="w-full max-w-md p-8">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">ARDEN</h1>
            <p class="text-gray-400">AI Routine Daily Engagement Nexus</p>
        </div>

        <!-- Login Card -->
        <div class="bg-surface rounded-lg shadow-xl p-8">
            <h2 class="text-2xl font-semibold text-white mb-6">Login</h2>
            
            <!-- Error Message -->
            <div id="error-message" class="hidden mb-4 p-3 bg-red-500/20 border border-red-500 rounded text-red-300 text-sm">
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4">
                <div>
                    <label for="token" class="block text-sm font-medium text-gray-300 mb-2">
                        API Token
                    </label>
                    <input 
                        type="password" 
                        id="token" 
                        name="token"
                        class="w-full px-4 py-2 bg-background border border-gray-600 rounded-lg text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"
                        placeholder="Enter your ARDEN API token"
                        required
                        autocomplete="off"
                    >
                    <p class="mt-2 text-xs text-gray-500">
                        Token is stored in your .env file as ARDEN_API_TOKEN
                    </p>
                </div>

                <button 
                    type="submit" 
                    id="login-button"
                    class="w-full bg-primary hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center"
                >
                    <span id="login-text">Login</span>
                    <svg id="login-spinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <!-- Info -->
            <div class="mt-6 pt-6 border-t border-gray-700">
                <p class="text-xs text-gray-500 text-center">
                    ARDEN Web Interface v1.0<br>
                    Local access only
                </p>
            </div>
        </div>
    </div>

    <script src="/assets/js/auth.js"></script>
</body>
</html>
