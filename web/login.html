<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDEN - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7aa2f7',
                        secondary: '#bb9af7',
                        accent: '#9ece6a',
                        danger: '#f7768e',
                        warning: '#e0af68',
                        background: '#1a1b26',
                        surface: '#24283b',
                        border: '#414868',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1a1b26;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-background">
    <div class="w-full max-w-md p-8">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="/assets/images/arden-logo.png" alt="ARDEN Logo" style="height: 80px; width: 80px; object-fit: contain;" onerror="this.style.display='none'">
            </div>
            <h1 class="text-4xl font-bold mb-2" style="color: #c0caf5;">ARDEN</h1>
            <p style="color: #9aa5ce;">AI Routine Daily Engagement Nexus</p>
        </div>

        <!-- Login Card -->
        <div class="bg-surface rounded-lg shadow-xl p-8">
            <h2 class="text-2xl font-semibold mb-6" style="color: #c0caf5;">Login</h2>
            
            <!-- Error Message -->
            <div id="error-message" class="hidden mb-4 p-3 rounded text-sm" style="background-color: rgba(247, 118, 142, 0.2); border: 1px solid #f7768e; color: #f7768e;">
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4">
                <div>
                    <label for="token" class="block text-sm font-medium mb-2" style="color: #9aa5ce;">
                        API Token
                    </label>
                    <input 
                        type="password" 
                        id="token" 
                        name="token"
                        class="w-full px-4 py-2 rounded-lg focus:outline-none focus:ring-1 focus:ring-primary"
                        style="background-color: #1a1b26; border: 1px solid #414868; color: #c0caf5;"
                        placeholder="Enter your ARDEN API token"
                        required
                        autocomplete="off"
                    >
                    <p class="mt-2 text-xs" style="color: #565f89;">
                        Token is stored in your .env file as ARDEN_API_TOKEN
                    </p>
                </div>

                <button 
                    type="submit" 
                    id="login-button"
                    class="w-full bg-primary hover:bg-opacity-80 font-medium py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center"
                    style="color: #1a1b26;"
                >
                    <span id="login-text">Login</span>
                    <svg id="login-spinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <!-- Info -->
            <div class="mt-6 pt-6" style="border-top: 1px solid #414868;">
                <p class="text-xs text-center" style="color: #565f89;">
                    ARDEN Web Interface v1.0<br>
                    Local access only
                </p>
            </div>
        </div>
    </div>

    <script src="/assets/js/auth.js"></script>
</body>
</html>
