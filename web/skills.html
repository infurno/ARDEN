<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDEN - Skills</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7aa2f7',
                        secondary: '#bb9af7',
                        accent: '#9ece6a',
                        danger: '#f7768e',
                        warning: '#e0af68',
                        background: '#1a1b26',
                        surface: '#24283b',
                        border: '#414868',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1a1b26;
        }
        .skill-card {
            transition: all 0.2s;
        }
        .skill-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }
        .skill-enabled {
            border-left: 4px solid #9ece6a;
        }
        .skill-disabled {
            border-left: 4px solid #565f89;
            opacity: 0.6;
        }
    </style>
</head>
<body class="min-h-screen bg-background">
    <!-- Header -->
    <header class="bg-surface border-b border-border">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="/assets/images/arden-logo.png" alt="ARDEN Logo" style="height: 40px; width: 40px; object-fit: contain;" onerror="this.style.display='none'">
                <h1 class="text-2xl font-bold" style="color: #c0caf5;">ARDEN</h1>
                <nav class="hidden md:flex space-x-4">
                    <a href="/chat.html" class="hover:text-primary" style="color: #9aa5ce; text-decoration: none;">Chat</a>
                    <a href="/notes.html" class="hover:text-primary" style="color: #9aa5ce; text-decoration: none;">Notes</a>
                    <a href="/todos.html" class="hover:text-primary" style="color: #9aa5ce; text-decoration: none;">TODOs</a>
                    <a href="/skills.html" class="text-primary font-medium" style="text-decoration: none;">Skills</a>
                    <a href="/dashboard.html" class="hover:text-primary" style="color: #9aa5ce; text-decoration: none;">Dashboard</a>
                    <a href="/settings.html" class="hover:text-primary" style="color: #9aa5ce; text-decoration: none;">Settings</a>
                </nav>
            </div>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="text-xl hover:opacity-80 transition-opacity" title="Toggle Dark Mode">🌙</button>
                <button id="logout-button" class="hover:text-danger text-sm" style="color: #9aa5ce;">
                    Logout
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-6">
        <!-- Header -->
        <div class="mb-8">
            <h2 class="text-2xl font-bold" style="color: #c0caf5;">🎯 Skills Configuration</h2>
            <p class="text-sm mt-2" style="color: #9aa5ce;">Manage and configure ARDEN's capabilities</p>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-surface border border-border rounded-lg p-4">
                <div class="text-sm" style="color: #9aa5ce;">Total Skills</div>
                <div class="text-2xl font-bold mt-1" style="color: #c0caf5;" id="stat-total">-</div>
            </div>
            <div class="bg-surface border border-border rounded-lg p-4">
                <div class="text-sm" style="color: #9aa5ce;">Enabled</div>
                <div class="text-2xl font-bold mt-1" style="color: #9ece6a;" id="stat-enabled">-</div>
            </div>
            <div class="bg-surface border border-border rounded-lg p-4">
                <div class="text-sm" style="color: #9aa5ce;">Disabled</div>
                <div class="text-2xl font-bold mt-1" style="color: #565f89;" id="stat-disabled">-</div>
            </div>
        </div>

        <!-- Skills List -->
        <div id="skills-container">
            <div class="text-center py-12" style="color: #9aa5ce;">
                <div class="text-4xl mb-4">⚙️</div>
                <p>Loading skills...</p>
            </div>
        </div>

        <!-- Skill Details Modal -->
        <div id="skill-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50" style="display: none;">
            <div class="bg-surface rounded-lg shadow-2xl max-w-3xl w-full mx-4 max-h-[90vh] overflow-hidden border border-border">
                <!-- Modal Header -->
                <div class="flex justify-between items-center p-6 border-b border-border">
                    <h3 id="modal-title" class="text-xl font-bold" style="color: #c0caf5;">Skill Details</h3>
                    <button id="modal-close" class="text-2xl hover:text-danger" style="color: #9aa5ce;">×</button>
                </div>
                
                <!-- Modal Content -->
                <div id="modal-content" class="p-6 overflow-y-auto max-h-[70vh]" style="color: #c0caf5;">
                    <!-- Content will be dynamically inserted -->
                </div>
                
                <!-- Modal Actions -->
                <div class="flex justify-end space-x-3 p-6 border-t border-border">
                    <button id="modal-cancel" class="px-4 py-2 rounded-lg hover:bg-opacity-80" style="background-color: #414868; color: #c0caf5;">
                        Close
                    </button>
                    <button id="modal-execute" class="px-4 py-2 rounded-lg hover:bg-opacity-80" style="background-color: #7aa2f7; color: #1a1b26;">
                        Execute Skill
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="/assets/js/theme.js?v=1"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/websocket.js?v=1"></script>
    <script src="/assets/js/skills.js"></script>
</body>
</html>
