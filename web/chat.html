<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDEN - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7aa2f7',
                        secondary: '#bb9af7',
                        accent: '#9ece6a',
                        danger: '#f7768e',
                        warning: '#e0af68',
                        background: '#1a1b26',
                        surface: '#24283b',
                        border: '#414868',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1a1b26;
        }
        .chat-message {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen bg-background">
    <!-- Header -->
    <header class="bg-surface border-b border-border">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="/assets/images/arden-logo.png" alt="ARDEN Logo" style="height: 40px; width: 40px; object-fit: contain;" onerror="this.style.display='none'">
                <h1 class="text-2xl font-bold" style="color: #c0caf5;">ARDEN</h1>
                <nav class="hidden md:flex space-x-4">
                    <a href="/chat.html" class="text-primary font-medium">Chat</a>
                    <a href="/notes.html" class="hover:text-primary" style="color: #9aa5ce;">Notes</a>
                    <a href="/dashboard.html" class="hover:text-primary" style="color: #9aa5ce;">Dashboard</a>
                </nav>
            </div>
            <div class="flex items-center space-x-4">
                <div id="status-indicator" class="flex items-center space-x-2">
                    <div class="w-2 h-2 bg-accent rounded-full"></div>
                    <span class="text-sm" style="color: #9aa5ce;">Connected</span>
                </div>
                <button id="logout-button" class="hover:text-danger text-sm" style="color: #9aa5ce;">
                    Logout
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-6 h-[calc(100vh-80px)] flex flex-col">
        <!-- Chat Header -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold" style="color: #c0caf5;">Chat with ARDEN</h2>
            <div class="flex items-center space-x-4">
                <!-- TTS Toggle -->
                <button id="tts-toggle" class="flex items-center space-x-2 text-sm hover:text-primary transition-colors" style="color: #9aa5ce;">
                    <svg id="tts-icon-off" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path>
                    </svg>
                    <svg id="tts-icon-on" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                    </svg>
                    <span id="tts-status">TTS Off</span>
                </button>
                <button id="clear-chat" class="text-sm hover:text-danger transition-colors" style="color: #9aa5ce;">
                    Clear History
                </button>
            </div>
        </div>

        <!-- Chat Container -->
        <div id="chat-container" class="flex-1 bg-surface rounded-lg shadow-xl overflow-hidden flex flex-col">
            <!-- Messages Area -->
            <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4">
                <!-- Welcome Message -->
                <div class="text-center py-8" style="color: #565f89;">
                    <p class="text-lg">👋 Welcome! Start a conversation with ARDEN.</p>
                    <p class="text-sm mt-2">Try asking about your TODOs, notes, or anything else.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="border-t p-4" style="border-color: #414868;">
                <form id="chat-form" class="flex space-x-3">
                    <!-- Voice Recording Button -->
                    <button 
                        type="button"
                        id="voice-button"
                        class="hover:bg-opacity-80 font-medium px-4 py-2 rounded-lg transition-colors duration-200 flex items-center"
                        style="background-color: #414868; color: #c0caf5;"
                        title="Hold to record voice message"
                    >
                        <svg id="mic-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                        </svg>
                        <svg id="recording-icon" class="hidden w-5 h-5 animate-pulse" fill="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="8"></circle>
                        </svg>
                    </button>
                    
                    <input 
                        type="text" 
                        id="message-input"
                        placeholder="Type your message or use voice..."
                        class="flex-1 px-4 py-2 rounded-lg focus:outline-none focus:ring-1 focus:ring-primary"
                        style="background-color: #24283b; border: 1px solid #414868; color: #c0caf5;"
                        autocomplete="off"
                    >
                    <button 
                        type="submit"
                        id="send-button"
                        class="bg-primary hover:bg-opacity-80 font-medium px-6 py-2 rounded-lg transition-colors duration-200 flex items-center"
                        style="color: #1a1b26;"
                    >
                        <span id="send-text">Send</span>
                        <svg id="send-spinner" class="hidden animate-spin ml-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="/assets/js/api.js?v=2"></script>
    <script src="/assets/js/voice.js?v=2"></script>
    <script src="/assets/js/chat.js?v=2"></script>
</body>
</html>
