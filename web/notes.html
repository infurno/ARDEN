<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - ARDEN</title>
  <link rel="stylesheet" href="/assets/css/tokyo-night.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#7aa2f7',
            secondary: '#bb9af7',
            accent: '#9ece6a',
            danger: '#f7768e',
            warning: '#e0af68',
            background: '#1a1b26',
            surface: '#24283b',
            border: '#414868',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: var(--bg-main);
      color: var(--text-main);
    }
    
    /* CodeMirror Custom Styles */
    .CodeMirror {
      height: 100% !important;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      background: #1a1b26 !important;
      color: #c0caf5 !important;
      border-radius: 0.5rem;
    }

    .CodeMirror-gutters {
      background: #16161e !important;
      border-right: 1px solid #414868 !important;
    }

    .CodeMirror-linenumber {
      color: #565f89 !important;
    }

    .CodeMirror-cursor {
      border-left-color: #c0caf5 !important;
    }

    .CodeMirror-selected {
      background: #283457 !important;
    }

    .CodeMirror-activeline-background {
      background: #1f2335 !important;
    }

    /* Vim mode indicator */
    .vim-mode-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-family: monospace;
      font-size: 0.9rem;
      z-index: 9999;
      display: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .vim-mode-indicator.visible {
      display: block;
    }

    .vim-mode-indicator.normal {
      background: #7aa2f7;
      color: #1a1b26;
    }

    .vim-mode-indicator.insert {
      background: #9ece6a;
      color: #1a1b26;
    }

    .vim-mode-indicator.visual {
      background: #bb9af7;
      color: #1a1b26;
    }

    /* Note card hover effect */
    .note-card {
      transition: all 0.2s;
    }

    .note-card:hover {
      transform: translateY(-2px);
    }

    /* Loading spinner */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .spinner {
      border: 3px solid #414868;
      border-top: 3px solid #7aa2f7;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body class="min-h-screen bg-background">
  <!-- Header -->
  <header class="bg-surface border-b border-border">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <img src="/assets/images/arden-logo.png" alt="ARDEN Logo" style="height: 40px; width: 40px; object-fit: contain;" onerror="this.style.display='none'">
        <h1 class="text-2xl font-bold tn-text-main">ARDEN</h1>
        <nav class="hidden md:flex space-x-4">
          <a href="/chat.html" class="hover:text-primary tn-text-secondary no-underline">Chat</a>
          <a href="/notes.html" class="hover:text-primary tn-text-secondary no-underline">Notes</a>
          <a href="/todos.html" class="hover:text-primary tn-text-secondary no-underline">TODOs</a>
          <a href="/skills.html" class="hover:text-primary tn-text-secondary">Skills</a>
          <a href="/dashboard.html" class="hover:text-primary tn-text-secondary no-underline">Dashboard</a>
          <a href="/sessions.html" class="hover:text-primary tn-text-secondary no-underline">Sessions</a>
          <a href="/settings.html" class="hover:text-primary tn-text-secondary no-underline">Settings</a>
        </nav>
      </div>
      <div class="flex items-center space-x-4">
        <button class="bg-primary hover:bg-opacity-80 font-medium px-4 py-2 rounded-lg transition-colors hidden md:inline-block tn-text-inverse" id="newNoteBtn">+ New Note</button>
        <button id="theme-toggle" class="text-xl hover:opacity-80 transition-opacity" title="Toggle Dark Mode">🌙</button>
        <button id="logout-button" class="hover:text-danger text-sm tn-text-secondary hidden md:block">
          Logout
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 py-6">
    <!-- Browser View -->
    <div id="browserView">
      <!-- Search and Filters -->
      <div class="bg-surface border border-border rounded-lg p-4 mb-6">
        <div class="flex flex-wrap items-center gap-4 mb-4">
          <div class="flex-1 min-w-64 relative">
            <input type="text" id="searchInput" placeholder="🔍 Search your notes..." 
                   class="w-full px-4 py-2 pr-10 rounded-lg focus:outline-none focus:ring-1 focus:ring-primary bg-background text-main border border-border tn-text-main">
            <button id="clearSearchBtn" 
                    class="absolute right-2 top-1/2 transform -translate-y-1/2 w-6 h-6 rounded-full flex items-center justify-center hover:bg-opacity-80 transition-all opacity-0 pointer-events-none bg-border tn-text-secondary text-xs"
                    title="Clear search">
              ✕
            </button>
          </div>
          <button class="bg-primary hover:bg-opacity-80 font-medium px-4 py-2 rounded-lg transition-colors tn-text-inverse" id="searchBtn">Search</button>
        </div>
        
        <div class="flex items-center space-x-4">
          <label class="tn-text-secondary text-sm">Sort by:</label>
          <select id="sortSelect" class="px-3 py-2 rounded-lg focus:outline-none focus:ring-1 focus:ring-primary bg-background tn-text-main border border-border">
            <option value="modified">Recently Modified</option>
            <option value="name">Name (A-Z)</option>
            <option value="size">Size</option>
          </select>
        </div>
      </div>

      <!-- Stats -->
      <div class="bg-surface border border-border rounded-lg p-4 mb-6" id="statsContainer">
        <div class="flex flex-wrap gap-6 tn-text-secondary text-sm">
          <span>Loading...</span>
        </div>
      </div>

      <!-- Notes Grid -->
      <div id="notesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="col-span-full flex flex-col items-center justify-center py-12">
          <div class="spinner mx-auto mb-4"></div>
          <p class="tn-text-secondary">Loading your notes...</p>
        </div>
      </div>

      <!-- Load More -->
      <div class="text-center mt-6 hidden" id="loadMoreContainer">
        <button class="bg-primary hover:bg-opacity-80 font-medium px-6 py-2 rounded-lg transition-colors tn-text-inverse" id="loadMoreBtn">Load More</button>
      </div>
    </div>

    <!-- Editor View -->
    <div id="editorView" class="hidden">
      <div class="bg-surface border border-border rounded-lg overflow-hidden" style="height: calc(100vh - 200px); display: flex; flex-direction: column;">
        <!-- Editor Header -->
        <div class="px-6 py-4 border-b border-border flex justify-between items-center">
          <div class="flex items-center space-x-4">
            <button class="px-3 py-1 rounded bg-border hover:bg-opacity-80 transition-colors tn-text-main text-sm" id="backToListBtn">
              ← Back
            </button>
            <div>
              <div class="font-semibold tn-text-main" id="editorTitle">Untitled</div>
              <div class="text-xs tn-text-tertiary" id="editorPath">~/Notes/</div>
            </div>
          </div>
          <div class="flex items-center space-x-2">
            <button class="px-3 py-1 rounded bg-border hover:bg-opacity-80 transition-colors tn-text-main text-sm disabled:opacity-40 disabled:cursor-not-allowed" id="backBtn" title="Go back (Alt+Left)" disabled>
              ◀
            </button>
            <button class="px-3 py-1 rounded bg-border hover:bg-opacity-80 transition-colors tn-text-main text-sm disabled:opacity-40 disabled:cursor-not-allowed" id="forwardBtn" title="Go forward (Alt+Right)" disabled>
              ▶
            </button>
            <button class="bg-border hover:bg-opacity-80 font-medium px-4 py-2 rounded-lg transition-colors tn-text-main ml-4" id="cancelEditBtn">Cancel</button>
            <button class="bg-accent hover:bg-opacity-80 font-medium px-4 py-2 rounded-lg transition-colors text-background" id="saveBtn">Save</button>
          </div>
        </div>

        <!-- Editor Tabs -->
        <div class="flex items-center px-6 border-b border-border">
          <button class="tab px-4 py-3 border-b-2 border-transparent hover:text-primary tn-text-secondary transition-colors active" data-tab="edit">Edit</button>
          <button class="tab px-4 py-3 border-b-2 border-transparent hover:text-primary tn-text-secondary transition-colors" data-tab="preview">Preview</button>
          <button class="tab px-4 py-3 border-b-2 border-transparent hover:text-primary tn-text-secondary transition-colors" data-tab="split">Split View</button>
          <div class="flex-1"></div>
          <button class="px-2 py-1 hover:bg-border rounded transition-colors" id="insertImageBtn" title="Insert image">🖼️</button>
          <button class="px-2 py-1 hover:bg-border rounded transition-colors" id="exportBtn" title="Export note">📤</button>
          <button class="px-2 py-1 hover:bg-border rounded transition-colors" id="editorSettingsBtn" title="Editor settings">⚙️</button>
        </div>
        <input type="file" id="imageUploadInput" accept="image/*" class="hidden" />

        <!-- Editor Content -->
        <div class="flex-1 overflow-hidden" id="editorContent">
          <!-- Content populated by JS -->
        </div>

        <!-- Editor Footer -->
        <div class="px-6 py-3 border-t border-border flex justify-between items-center bg-background">
          <div class="flex gap-6 text-xs tn-text-secondary" id="editorStats">
            <span>Words: 0</span>
            <span>Characters: 0</span>
            <span>Lines: 0</span>
          </div>
          <div class="flex items-center gap-4">
            <label class="text-xs tn-text-secondary cursor-pointer flex items-center gap-2">
              <input type="checkbox" id="autoSaveToggle" checked class="rounded"> Auto-save
            </label>
            <div class="text-xs text-accent" id="saveStatus">Saved</div>
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <!-- Editor Settings Modal -->
  <div class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center z-50" id="editorSettingsModal">
    <div class="bg-surface rounded-lg p-6 max-w-md w-full mx-4 max-h-[80vh] overflow-y-auto">
      <h3 class="text-xl font-semibold mb-6 tn-text-main">⚙️ Editor Settings</h3>
      
      <div class="space-y-4">
        <label class="flex items-start gap-3 p-3 rounded hover:bg-background cursor-pointer transition-colors">
          <input type="checkbox" id="vimModeToggle" class="mt-1">
          <div>
            <div class="font-medium tn-text-main">Vim Mode</div>
            <div class="text-sm tn-text-tertiary">Enable Vim keybindings (hjkl navigation, modes, etc.)</div>
          </div>
        </label>

        <label class="flex items-start gap-3 p-3 rounded hover:bg-background cursor-pointer transition-colors">
          <input type="checkbox" id="lineNumbersToggle" checked class="mt-1">
          <div>
            <div class="font-medium tn-text-main">Line Numbers</div>
            <div class="text-sm tn-text-tertiary">Show line numbers in the editor</div>
          </div>
        </label>

        <label class="flex items-start gap-3 p-3 rounded hover:bg-background cursor-pointer transition-colors">
          <input type="checkbox" id="lineWrappingToggle" checked class="mt-1">
          <div>
            <div class="font-medium tn-text-main">Line Wrapping</div>
            <div class="text-sm tn-text-tertiary">Wrap long lines instead of horizontal scrolling</div>
          </div>
        </label>

        <label class="flex items-start gap-3 p-3 rounded hover:bg-background cursor-pointer transition-colors">
          <input type="checkbox" id="highlightActiveLineToggle" checked class="mt-1">
          <div>
            <div class="font-medium tn-text-main">Highlight Active Line</div>
            <div class="text-sm tn-text-tertiary">Highlight the line where the cursor is</div>
          </div>
        </label>

        <label class="flex items-start gap-3 p-3 rounded hover:bg-background cursor-pointer transition-colors">
          <input type="checkbox" id="autoCloseBracketsToggle" class="mt-1">
          <div>
            <div class="font-medium tn-text-main">Auto-close Brackets</div>
            <div class="text-sm tn-text-tertiary">Automatically close brackets and quotes</div>
          </div>
        </label>
      </div>

      <div class="mt-6 flex justify-end">
        <button class="bg-border hover:bg-opacity-80 font-medium px-4 py-2 rounded-lg transition-colors tn-text-main" id="closeEditorSettingsBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- Vim Mode Indicator -->
  <div class="vim-mode-indicator" id="vimModeIndicator">
    NORMAL
  </div>

  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <!-- DOMPurify for XSS protection -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
  
  <!-- CodeMirror for advanced editor -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/keymap/vim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/edit/continuelist.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/selection/active-line.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/display/placeholder.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/search/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/search/searchcursor.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/dialog/dialog.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/dialog/dialog.min.css">
  
  <script src="/assets/js/websocket.js?v=1"></script>
  <script src="/assets/js/notes.js"></script>
  <script src="/assets/js/mobile-nav.js?v=1"></script>

  <style>
    /* Tab active state */
    .tab.active {
      color: var(--tn-primary);
      border-bottom-color: var(--tn-primary);
    }
    
    /* Clear search button visibility */
    #clearSearchBtn.visible {
      opacity: 1;
      pointer-events: auto;
    }
    
    /* Save status unsaved */
    #saveStatus.unsaved {
      color: var(--tn-danger);
    }
    
    /* Modal visible state */
    #editorSettingsModal.visible {
      display: flex;
    }
    
    /* Editor panes for split view */
    .editor-pane {
      height: 100%;
      overflow: auto;
    }
    
    .preview-pane {
      padding: 2rem;
      background: var(--bg-main);
      border-left: 1px solid var(--tn-border);
    }
    
    /* GitHub-style markdown preview */
    .preview-content {
      max-width: 900px;
      margin: 0 auto;
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      word-wrap: break-word;
    }
    
    .preview-content > *:first-child {
      margin-top: 0 !important;
    }
    
    .preview-content > *:last-child {
      margin-bottom: 0 !important;
    }
    
    .preview-content h1,
    .preview-content h2,
    .preview-content h3,
    .preview-content h4,
    .preview-content h5,
    .preview-content h6 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
      color: var(--text-main);
    }
    
    .preview-content h1 {
      font-size: 2em;
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--tn-border);
    }
    
    .preview-content h2 {
      font-size: 1.5em;
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--tn-border);
    }
    
    .preview-content h3 { font-size: 1.25em; }
    .preview-content h4 { font-size: 1em; }
    .preview-content h5 { font-size: 0.875em; }
    .preview-content h6 { font-size: 0.85em; color: var(--text-secondary); }
    
    .preview-content p {
      margin-top: 0;
      margin-bottom: 16px;
    }
    
    .preview-content code {
      background: rgba(110, 118, 129, 0.2);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
      font-size: 85%;
    }
    
    .preview-content pre {
      background: var(--bg-surface);
      padding: 16px;
      border-radius: 6px;
      overflow: auto;
      margin-bottom: 16px;
      font-size: 85%;
      line-height: 1.45;
    }
    
    .preview-content pre code {
      background: none;
      padding: 0;
      border-radius: 0;
      font-size: 100%;
      display: inline;
      max-width: auto;
      overflow: visible;
      line-height: inherit;
      word-wrap: normal;
    }
    
    .preview-content ul,
    .preview-content ol {
      margin-top: 0;
      margin-bottom: 16px;
      padding-left: 2em;
    }
    
    .preview-content li {
      margin-top: 0.25em;
    }
    
    .preview-content li + li {
      margin-top: 0.25em;
    }
    
    .preview-content ul ul,
    .preview-content ul ol,
    .preview-content ol ol,
    .preview-content ol ul {
      margin-top: 0;
      margin-bottom: 0;
    }
    
    .preview-content a {
      color: var(--tn-primary);
      text-decoration: none;
    }
    
    .preview-content a:hover {
      text-decoration: underline;
    }
    
    .preview-content a.wiki-link {
      color: var(--tn-secondary);
    }
    
    .preview-content blockquote {
      border-left: 4px solid var(--tn-border);
      padding: 0 1em;
      margin: 0 0 16px 0;
      color: var(--text-secondary);
    }
    
    .preview-content blockquote > :first-child {
      margin-top: 0;
    }
    
    .preview-content blockquote > :last-child {
      margin-bottom: 0;
    }
    
    .preview-content table {
      width: 100%;
      border-collapse: collapse;
      border-spacing: 0;
      margin-bottom: 16px;
      display: block;
      overflow: auto;
    }
    
    .preview-content table th {
      font-weight: 600;
    }
    
    .preview-content table th,
    .preview-content table td {
      border: 1px solid var(--tn-border);
      padding: 6px 13px;
    }
    
    .preview-content table tr {
      background-color: var(--bg-main);
      border-top: 1px solid var(--tn-border);
    }
    
    .preview-content table tr:nth-child(2n) {
      background-color: var(--bg-surface);
    }
    
    .preview-content img {
      max-width: 100%;
      box-sizing: content-box;
    }
    
    .preview-content hr {
      height: 0.25em;
      padding: 0;
      margin: 24px 0;
      background-color: var(--tn-border);
      border: 0;
    }
    
    .preview-content input[type="checkbox"] {
      margin-right: 0.5em;
    }
    
    .preview-content strong {
      font-weight: 600;
    }
    
    .preview-content em {
      font-style: italic;
    }
    
    .preview-content del {
      text-decoration: line-through;
    }
  </style>
</body>
</html>
