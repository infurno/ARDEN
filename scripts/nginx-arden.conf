# Installation instructions:
# 1. Install nginx: sudo apt install nginx
# 2. Copy this file to /etc/nginx/sites-available/arden
# 3. Update server_name with your domain
# 4. Install SSL certificate:
#    sudo apt install certbot python3-certbot-nginx
#    sudo certbot --nginx -d your-domain.com
# 5. Enable site: sudo ln -s /etc/nginx/sites-available/arden /etc/nginx/sites-enabled/
# 6. Test config: sudo nginx -t
# 7. Reload nginx: sudo systemctl reload nginx
# 8. Configure firewall:
#    sudo ufw allow 'Nginx Full'
