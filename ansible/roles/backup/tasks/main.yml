---
# Backup role - Configure automated backups

- name: Create backup directory
  file:
    path: "/home/{{ app_user }}/backups"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  become: yes

- name: Install backup script
  template:
    src: backup.sh.j2
    dest: "/home/{{ app_user }}/backup.sh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  become: yes

- name: Setup daily backup cron job
  cron:
    name: "ARDEN daily backup"
    minute: "0"
    hour: "2"
    job: "/home/{{ app_user }}/backup.sh >> /home/{{ app_user }}/backups/backup.log 2>&1"
    user: "{{ app_user }}"
  become: yes

- name: Create initial backup
  command: "/home/{{ app_user }}/backup.sh"
  become: yes
  become_user: "{{ app_user }}"
  register: initial_backup
  changed_when: true
  failed_when: false

- name: Display backup status
  debug:
    msg: "{{ initial_backup.stdout_lines }}"
