version: '3.8'

services:
  # ARDEN Telegram Bot
  arden-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arden-bot
    restart: unless-stopped
    
    # NVIDIA GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    # Environment variables (override with .env file)
    environment:
      # Required
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      
      # AI Provider (claude, ollama, openai, lmstudio)
      - AI_PROVIDER=${AI_PROVIDER:-claude}
      
      # OpenAI (required for OpenAI provider or OpenAI Whisper STT)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      
      # ElevenLabs TTS (optional)
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      
      # Ollama (if using ollama provider)
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      
      # LM Studio (if using lmstudio provider)
      - LMSTUDIO_URL=${LMSTUDIO_URL:-http://host.docker.internal:1234}
      
      # Node environment
      - NODE_ENV=production
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    
    # Persistent volumes
    volumes:
      # Configuration (read-only)
      - ./config:/app/config:ro
      
      # Logs (persistent)
      - arden-logs:/app/api/logs
      
      # History (persistent)
      - arden-history:/app/history
      
      # Voice recordings (ephemeral - can use tmpfs for performance)
      - arden-voice-recordings:/app/voice/recordings
      - arden-voice-responses:/app/voice/responses
      
      # Skills (read-only)
      - ./skills:/app/skills:ro
      
      # Whisper models cache (persistent to avoid re-downloading)
      - whisper-models:/root/.cache/whisper
    
    # Network
    networks:
      - arden-network
    
    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Dependencies
    depends_on:
      ollama:
        condition: service_healthy
        required: false

  # Ollama (Optional - for local LLM support)
  ollama:
    image: ollama/ollama:latest
    container_name: arden-ollama
    restart: unless-stopped
    profiles:
      - ollama  # Only start if --profile ollama is used
    
    # NVIDIA GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    volumes:
      # Persistent model storage
      - ollama-models:/root/.ollama
    
    ports:
      - "11434:11434"
    
    networks:
      - arden-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volumes for persistence
volumes:
  arden-logs:
    driver: local
  arden-history:
    driver: local
  arden-voice-recordings:
    driver: local
  arden-voice-responses:
    driver: local
  whisper-models:
    driver: local
  ollama-models:
    driver: local

# Network
networks:
  arden-network:
    driver: bridge
